### Exercise 1 — Your First Fetch **API:**
`https://jsonplaceholder.typicode.com/posts/1` Fetch post #1 and log the entire
response object to the console. Then log only the `title` property. **Starter:**
```html
<script>
  // Write your fetch here
</script>
``` **What to practise:** `fetch()`, `.json()`, reading properties

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My first fetch</title>
  </head>
  <body>
    <script>
      // Write your fetch here
      fetch("https://jsonplaceholder.typicode.com/posts/1")
        .then((response) => response.json())
        .then((data) => {
          console.log(data); // Log the entire response object
          console.log(data.title); // Log only the title property
        })
        .catch((error) => console.error("Error fetching data:", error));
    </script>
  </body>
</html>
