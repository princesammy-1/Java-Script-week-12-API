<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display on the page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div
      id="user-container"
      class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
    ></div>

    <script>
      async function displayUsers() {
        const container = document.getElementById("user-container");

        try {
          const response = await fetch("https://jsonplaceholder.typicode.com/users");
          if (!response.ok) {
            throw new Error("Failed to load users");
          }

          const users = await response.json();
          users.forEach((user) => {
            const card = document.createElement("div");
            card.className = "bg-white p-4 rounded shadow";

            const name = document.createElement("h2");
            name.className = "text-xl font-bold mb-2";
            name.textContent = user.name;

            const email = document.createElement("p");
            email.className = "text-gray-600";
            email.textContent = user.email;

            card.appendChild(name);
            card.appendChild(email);
            container.appendChild(card);
          });
        } catch (error) {
          console.error("Error fetching data:", error);
          container.innerHTML = `<p class="text-red-600">Unable to load users.</p>`;
        }
      }

      displayUsers();
    </script>
  </body>
</html>
